name: Release PoC Validation

on:
  pull_request:
    types: [closed]
    branches:
      - main

permissions:
  contents: read

jobs:
  poc:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.title, 'chore: release ')
    
    runs-on: ubuntu-latest

    steps:
      - name: Extract PR controlled value
        id: version
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          VERSION="${PR_TITLE#chore: release }"

          echo "PR Title:"
          echo "$PR_TITLE"

          echo "Extracted Version:"
          echo "$VERSION"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Show result
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          echo "Final release version:"
          echo "$VERSION"
